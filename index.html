<!DOCTYPE html>
<html lang="tr">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalite Güvence Değerlendirme Sistemi | Eğitim ve Öğretim</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg: #f8fafc; --primary: #0f172a; --accent: #0284c7; --success: #16a34a; --danger: #dc2626; --warning: #d97706; --border: #cbd5e1; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; line-height: 1.6; color: #334155; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .container { max-width: 100%; margin: 0; padding: 0; }
            .nav-panel { display: none !important; }
            .layout { display: block !important; }
            .sidebar { display: none !important; }
            .section-card { page-break-inside: avoid; break-inside: avoid; margin: 0; border: none; box-shadow: none; }
            .sub-item { page-break-inside: avoid; break-inside: avoid; border-color: #e2e8f0; }
            .btn-save, .btn-score, .suggestion-box, .interactive-panel, .evidence-box, .rte-toolbar { display: none !important; }
        }
        
        /* PDF Export Styles */
        .pdf-report { font-family: 'Segoe UI', Arial, sans-serif; color: #1f2937; }
        .pdf-header { background: #0f172a; color: white; padding: 30px; text-align: center; border-bottom: 4px solid #0284c7; }
        .pdf-header h1 { margin: 0; font-size: 26px; font-weight: 800; }
        .pdf-header p { margin: 8px 0 0 0; font-size: 13px; opacity: 0.9; }
        .pdf-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; background: #f1f5f9; border-bottom: 1px solid #e2e8f0; }
        .pdf-meta-item { text-align: center; }
        .pdf-meta-label { font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase; }
        .pdf-meta-value { font-size: 18px; font-weight: 800; color: #0f172a; margin-top: 4px; }
        .pdf-section { margin-bottom: 30px; }
        .pdf-section-title { font-size: 15px; font-weight: bold; color: white; background: #1e293b; padding: 10px 15px; margin-bottom: 15px; border-left: 4px solid #0284c7; display: flex; justify-content: space-between; }
        .pdf-item { border: 1px solid #e2e8f0; border-radius: 6px; padding: 15px; margin-bottom: 12px; background: white; page-break-inside: avoid; }
        .pdf-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .pdf-item-name { font-weight: 700; font-size: 13px; color: #0f172a; max-width: 80%; }
        .pdf-item-score { font-weight: bold; font-size: 14px; padding: 4px 10px; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; border-radius: 4px; }
        .pdf-item-comment { font-size: 11px; color: #475569; line-height: 1.6; margin-top: 8px; padding: 10px; background: #f8fafc; border-radius: 4px; border: 1px dashed #cbd5e1; word-wrap: break-word; }
        .pdf-item-comment a { color: #0284c7; text-decoration: underline; font-weight: bold; }
        .pdf-overall { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 6px; padding: 15px; margin-top: 20px; }
        .pdf-overall-title { font-weight: 800; color: #0369a1; margin-bottom: 8px; font-size: 13px; text-transform: uppercase; }
        .pdf-overall-text { font-size: 12px; color: #0c4a6e; line-height: 1.6; word-wrap: break-word; }
        .pdf-overall-text a { color: #0284c7; text-decoration: underline; font-weight: bold; }
        
        /* App UI Styles */
        .nav-panel { background: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); display: flex; align-items: center; gap: 20px; border-top: 4px solid var(--accent); flex-wrap: wrap; }
        .nav-group { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 300px; }
        .nav-panel select, .nav-panel input { padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; flex: 1; outline: none; font-family: inherit; }
        .nav-panel select { background: #f8fafc; font-weight: 600; cursor: pointer; }
        .nav-panel select:focus, .nav-panel input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1); }

        .layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; align-items: start; }
        main { min-width: 0; } /* YENİ: Sağ menünün ekrandan taşmasını engeller */
        
        .section-card { background: white; border-radius: 12px; padding: 30px; margin-bottom: 30px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .section-header { border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .section-title { font-size: 1.3rem; font-weight: 800; color: var(--primary); }
        .section-score { font-size: 1.2rem; font-weight: 800; color: var(--accent); background: #f0f9ff; padding: 4px 16px; border-radius: 8px; border: 1px solid #bae6fd; }
        
        .sub-item { border: 1px solid #f1f5f9; border-radius: 10px; padding: 25px; margin-bottom: 30px; background: #ffffff; transition: 0.2s; }
        .sub-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 20px; border-left: 4px solid var(--accent); padding-left: 12px; color: var(--primary); }

        /* Likert Checklist & Dynamic Suggestion */
        .interactive-panel { display: grid; grid-template-columns: 1fr 280px; gap: 20px; margin-bottom: 20px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .checklist-container h4 { margin: 0 0 15px 0; font-size: 0.9rem; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
        .check-item { display: flex; align-items: center; justify-content: space-between; gap: 15px; margin-bottom: 10px; padding: 10px; background: white; border: 1px solid #e2e8f0; border-radius: 6px; }
        .check-text { font-size: 0.85rem; color: #334155; line-height: 1.4; flex: 1; }
        .likert-group { display: flex; gap: 4px; }
        .likert-group input[type="radio"] { display: none; }
        .likert-group label { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 6px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: 0.2s; color: #64748b; background: #f8fafc; }
        .likert-group label:hover { border-color: var(--accent); color: var(--accent); }
        .likert-group input[type="radio"]:checked + label { background: var(--accent); border-color: var(--accent); color: white; box-shadow: 0 2px 4px rgba(2, 132, 199, 0.2); }
        
        .suggestion-box { background: white; border: 2px solid var(--border); border-radius: 8px; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.3s; }
        .suggestion-box.active { border-color: var(--accent); box-shadow: 0 4px 12px rgba(2, 132, 199, 0.1); }
        .sugg-label { font-size: 0.8rem; font-weight: 700; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        .sugg-value { font-size: 2.5rem; font-weight: 900; color: var(--primary); line-height: 1; margin-bottom: 10px; transition: 0.3s; }
        .btn-apply-sugg { background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; opacity: 0.5; pointer-events: none; transition: 0.2s; }
        .suggestion-box.active .btn-apply-sugg { opacity: 1; pointer-events: auto; }
        .suggestion-box.active .btn-apply-sugg:hover { background: #0369a1; transform: translateY(-1px); }

        /* Main Score Buttons */
        .score-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .btn-score { flex: 1; height: 45px; border-radius: 8px; border: 1px solid var(--border); background: #ffffff; font-weight: 800; cursor: pointer; transition: all 0.2s; font-size: 1.1rem; color: #475569; }
        .btn-score:hover { border-color: var(--accent); color: var(--accent); background: #f0f9ff; }
        .btn-score.active { color: white; border-color: transparent; }
        .btn-score.active.lv5 { background: var(--success); }
        .btn-score.active.lv4 { background: #84cc16; }
        .btn-score.active.lv3 { background: var(--accent); }
        .btn-score.active.lv2 { background: var(--warning); }
        .btn-score.active.lv1 { background: var(--danger); }

        .rubric-table { width: 100%; border-collapse: collapse; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 20px; font-size: 0.8rem; background: white; table-layout: fixed; }
        .rubric-table th, .rubric-table td { border: 1px solid var(--border); padding: 12px; text-align: left; vertical-align: top; line-height: 1.5; }
        .rubric-table th { background: #f1f5f9; color: #0f172a; font-weight: 700; text-align: center; }
        .rubric-table td { color: #475569; }
        .rubric-table td b { display: block; margin-bottom: 6px; font-size: 0.9rem; color: var(--primary); text-align: center; background: #f8fafc; padding: 4px; border-radius: 4px; border: 1px solid #e2e8f0; }
        .rubric-table td.selected-level { background-color: #f0fdf4; border-color: #bbf7d0; color: #166534; box-shadow: inset 0 0 0 2px #22c55e; }
        .rubric-table td.selected-level b { background-color: #dcfce7; color: #166534; border-color: #86efac; }

        /* Zengin Metin (Rich Text) Editörü Stilleri - YENİLENDİ */
        .rte-container { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-top: 15px; background: white; transition: 0.2s; }
        .rte-container:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1); }
        .rte-toolbar { background: #f8fafc; padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
        .rte-btn { background: white; border: 1px solid #cbd5e1; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 0.85rem; color: #475569; font-weight: 600; display: flex; align-items: center; gap: 4px; transition: 0.2s; }
        .rte-btn:hover { background: #f1f5f9; color: var(--accent); border-color: var(--accent); }
        
        .comment-area { width: 100%; box-sizing: border-box; padding: 15px; min-height: 120px; font-family: inherit; font-size: 0.9rem; line-height: 1.6; background: white; overflow-y: auto; overflow-x: hidden; cursor: text; white-space: pre-wrap; overflow-wrap: break-word; word-wrap: break-word; word-break: break-word; outline: none; border: none; }
        .comment-area:empty:before { content: attr(data-placeholder); color: #94a3b8; pointer-events: none; display: block; }
        .comment-area a { color: #0284c7 !important; text-decoration: underline !important; font-weight: 600; cursor: pointer; word-break: break-all; }
        .comment-area * { max-width: 100%; font-size: inherit !important; font-family: inherit !important; background: transparent !important; margin-top: 0; white-space: pre-wrap !important; overflow-wrap: break-word !important; word-break: break-word !important; }

        /* Dynamic Evidence Box */
        .evidence-box { background: #f8fafc; border: 2px dashed #94a3b8; border-radius: 8px; padding: 15px; margin-top: 15px; transition: all 0.3s ease; }
        .evidence-box label { font-size: 0.9rem; font-weight: 600; color: var(--primary); display: block; margin-bottom: 8px; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; }
        .preview-container { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; }

        #image-modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 2000; justify-content: center; align-items: center; padding: 40px; }
        #image-modal img { max-width: 100%; max-height: 100%; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .modal-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 2.5rem; cursor: pointer; font-weight: bold; background: none; border: none; transition: 0.2s; }
        .modal-close:hover { color: #ef4444; }

        /* Sidebar */
        .sidebar { position: sticky; top: 20px; }
        .score-panel { background: var(--primary); color: white; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .grand-total { font-size: 4.5rem; font-weight: 900; margin: 10px 0; line-height: 1; color: #f8fafc; }
        .total-max { font-size: 1.2rem; color: #94a3b8; font-weight: 600; display: block; margin-bottom: 15px; }
        .status-badge { padding: 8px 24px; border-radius: 20px; font-weight: 800; font-size: 0.9rem; display: inline-block; margin-bottom: 20px; letter-spacing: 1px; }
        
        .summary-list { text-align: left; margin-top: 20px; font-size: 0.85rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .summary-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .summary-row span { color: #cbd5e1; font-weight: 500; }
        .summary-row b { color: white; font-size: 1.05rem; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 6px; }
        
        .btn-save { width: 100%; background: var(--success); color: white; border: none; padding: 16px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 1rem; margin-top: 25px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save:hover { background: #15803d; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3); }

        #loader { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); color: white; align-items: center; justify-content: center; z-index: 1000; font-size: 1.2rem; font-weight: 600; flex-direction: column; gap: 15px; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="loader-text">İşlem Yapılıyor...</div>
</div>

<div id="image-modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <img id="modal-img" src="">
</div>

<div class="container">
    <div class="nav-panel">
        <div class="nav-group">
            <b>Veritabanı:</b>
            <select id="project-selector" onchange="handleProjectSelection()">
                <option value="NEW">-- Yeni Değerlendirme Formu --</option>
            </select>
        </div>
        <div class="nav-group">
            <b>Kurum/Birim ID:</b>
            <input type="text" id="proj-no" placeholder="Örn: EGT-2026-01" style="max-width: 150px;">
            <b>Program/Bölüm Adı:</b>
            <input type="text" id="proj-name" placeholder="Değerlendirilen Program Adı">
        </div>
    </div>

    <div class="layout">
        <main id="main-content"></main>
        
        <aside class="sidebar">
            <div class="score-panel">
                <h3 style="margin-top:0; color:#cbd5e1; font-size:0.9rem; text-transform:uppercase;">Toplam Puan</h3>
                <div class="grand-total" id="grand-total">0</div>
                <span class="total-max" id="total-max-lbl">/ 400 Puan</span>
                <div id="status-badge" class="status-badge" style="background: var(--danger);">GELİŞTİRİLMELİ</div>
                
                <div id="summary-list" class="summary-list"></div>
                
                <button class="btn-save" onclick="saveData()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                    KAYDET & AKTAR
                </button>
                <button class="btn-save" style="background:var(--accent); margin-top:12px;" onclick="exportPDF()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    PDF RAPORU AL
                </button>
            </div>
        </aside>
    </div>
</div>

<script>
// ==========================================
// KENDİ WEB APP URL'Nİ BURAYA YAPIŞTIR
// ==========================================
const GOOGLE_APP_URL = "https://script.google.com/macros/s/AKfycbwaiafs0KmIzf__dVyKhPXl1k1J2wLuPZlrmqdSy76_El4Uiar9oxTKF1p6s4wEZbsUBw/exec";
const IMGBB_API_KEY = "cbc42adcd1c112c6d5a9e92eaedc4c56";
const IMGBB_UPLOAD_URL = "https://api.imgbb.com/1/upload";

let currentAttachments = {};

const rubricData = [
    {
        title: "B.1. Program Tasarımı, Değerlendirmesi ve Güncellenmesi", maxWeight: 140, 
        items: [
            {
                id: "B.1.1", name: "Programların tasarımı ve onayı",
                levels: [
                    "Kurumda programların tasarımı ve onayına ilişkin süreçler tanımlanmamıştır.",
                    "Kurumda programların tasarımı ve onayına ilişkin ilke, yöntem, TYYÇ ile uyum ve paydaş katılımını içeren tanımlı süreçler bulunmaktadır.",

            {

            {

function addLinkToSelection() {
    const url = prompt("Seçili metne eklenecek bağlantıyı (URL) girin:\nÖrn: https://huzem.hitit.edu.tr/belge", "https://");
    if (url && url !== "https://") {
        document.execCommand('createLink', false, url);
        
        const selection = window.getSelection();
        if (selection.focusNode && selection.focusNode.parentNode.tagName === 'A') {
            selection.focusNode.parentNode.setAttribute('target', '_blank');
            selection.focusNode.parentNode.setAttribute('rel', 'noopener noreferrer');
        }
    }
}

function handleFileUpload(input, cleanId) {
    if (!currentAttachments[cleanId]) currentAttachments[cleanId] = [];

    Array.from(input.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
            if (file.type.startsWith('image/')) {
                const attachment = {
                    type: 'image',
                    title: file.name,
                    src: e.target.result,
                    url: null,
                    status: IMGBB_API_KEY && !IMGBB_API_KEY.includes('BURAYA') ? 'uploading' : 'pending'
                };
                currentAttachments[cleanId].push(attachment);
                renderPreviews(cleanId);

                if (IMGBB_API_KEY && !IMGBB_API_KEY.includes('BURAYA')) {
                    uploadImageToImgbb(attachment, cleanId);
                }
            } else if (file.type === 'application/pdf') {
                const attachment = {
                    type: 'pdf',
                    title: file.name,
                    src: e.target.result,
                    url: null,
                    status: 'uploading'
                };
                currentAttachments[cleanId].push(attachment);
                renderPreviews(cleanId);
                uploadFileToDrive(attachment, cleanId, file.type);
            }
        };
        reader.readAsDataURL(file);
    });
}

function uploadImageToImgbb(attachment, cleanId) {
    const base64 = attachment.src.split(',')[1] || '';
    const params = new URLSearchParams();
    params.append('key', IMGBB_API_KEY);
    params.append('image', base64);
    params.append('name', attachment.title.replace(/\.[^/.]+$/, ''));

    fetch(IMGBB_UPLOAD_URL, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: params.toString()
    })
    .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
    })
    .then(data => {
        if (data && data.success && data.data && data.data.url) {
            attachment.url = data.data.url;
            attachment.status = 'done';
        } else {
            attachment.status = 'error';
            console.error('imgbb upload error', data);
        }
        renderPreviews(cleanId);
    })
    .catch(err => {
        attachment.status = 'error';
        console.error('imgbb upload failed', err);
        renderPreviews(cleanId);
    });
}

function uploadFileToDrive(attachment, cleanId, mimeType) {
    const base64 = attachment.src.split(',')[1] || '';
    const fileEntry = {
        fileName: attachment.title,
        mimeType: mimeType,
        data: base64
    };

    fetch(`${GOOGLE_APP_URL}?action=uploadFile`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(fileEntry)
    })
    .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
    })
    .then(data => {
        if (data && data.status === 'success' && data.url) {
            attachment.url = data.url;
            attachment.status = 'done';
        } else {
            attachment.status = 'error';
            console.error('Drive upload error', data);
        }
        renderPreviews(cleanId);
    })
    .catch(err => {
        attachment.status = 'error';
        console.error('Drive upload failed', err);
        renderPreviews(cleanId);
    });
}

function addEvidenceLink(cleanId) {
    const input = document.getElementById(`url-input-${cleanId}`);
    let url = input.value.trim();
    if (!url) return;

    if (!/^https?:\/\//i.test(url)) {
        url = 'https://' + url;
    }

    const title = prompt('Bu bağlantı için bir isim girin:', url) || url;
    if (!currentAttachments[cleanId]) currentAttachments[cleanId] = [];
    currentAttachments[cleanId].push({
        type: 'url',
        title: title,
        url: url,
        src: url,
        status: 'done'
    });
    input.value = '';
    renderPreviews(cleanId);
}

function renderPreviews(cleanId) {
    const container = document.getElementById(`preview-container-${cleanId}`);
    container.innerHTML = '';

    if (currentAttachments[cleanId]) {
        currentAttachments[cleanId].forEach((attachment, idx) => {
            const wrap = document.createElement('div');
            wrap.style.cssText = "display: flex; flex-direction: column; gap: 8px; background: white; border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-size: 0.85rem; width: 100%; box-sizing: border-box;";

            const isImage = attachment.type === 'image';
            const isPdf = attachment.type === 'pdf';

            const displayUrl = attachment.url || attachment.src;
            let previewHtml = '';
            if (isImage) {
                previewHtml = `<div style="display:flex; align-items:center; gap:10px;">
                                   <img src="${displayUrl}" style="width:40px; height:40px; object-fit:cover; border-radius:4px; border:1px solid #ccc; cursor:pointer;" onclick="openModal('${displayUrl}')" title="Görüntülemek için tıkla">
                                   <strong style="color: var(--accent);">${escapeHtml(attachment.title || 'Resim')}</strong>
                               </div>`;
            } else if (isPdf) {
                previewHtml = `<div style="display:flex; align-items:center; gap:10px;">
                                   <span style="font-size:24px;">📄</span>
                                   <a href="${displayUrl}" target="_blank" download="${escapeHtml(attachment.title || 'belge.pdf')}" style="color: var(--accent); text-decoration: none; font-weight: 600;">${escapeHtml(attachment.title || 'PDF Belgesi')}</a>
                               </div>`;
            } else {
                previewHtml = `<div style="display:flex; align-items:center; gap:10px; flex-wrap: wrap;">
                                   <span style="font-size:24px;">🔗</span>
                                   <a href="${displayUrl}" target="_blank" style="color: var(--accent); text-decoration: none; font-weight: 600;">${escapeHtml(attachment.title || displayUrl)}</a>
                               </div>`;
            }

            const statusText = attachment.status === 'uploading'
                ? '<span style="color: #2563eb; font-size:0.8rem;">Yükleniyor...</span>'
                : attachment.status === 'error'
                ? '<span style="color: #dc2626; font-size:0.8rem;">Yükleme hatası</span>'
                : '';

            wrap.innerHTML = `
                <div style="display:flex; align-items:center; justify-content: space-between; gap: 10px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 0;">${previewHtml}${statusText ? `<div>${statusText}</div>` : ''}</div>
                    <button type="button" onclick="removeAttachment('${cleanId}', ${idx})" style="background: var(--danger); color: white; border: none; border-radius: 4px; padding: 6px 10px; cursor: pointer; font-weight: bold; font-size: 0.75rem;">SİL</button>
                </div>
                <input type="text" value="${escapeHtml(attachment.title || '')}" onchange="updateAttachmentTitle('${cleanId}', ${idx}, this.value)" placeholder="Ek adı girin" style="width:100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; outline: none;" />
            `;

            container.appendChild(wrap);
        });
    }
}

function removeAttachment(cleanId, idx) {
    currentAttachments[cleanId].splice(idx, 1);

function calculateSuggestion(cleanId) {
    const container = document.getElementById(`btn-group-${cleanId}`).parentElement;
    const checkedRadios = container.querySelectorAll('.likert-group input[type="radio"]:checked');
    
    if(checkedRadios.length === 0) {
        const suggBox = document.getElementById(`sugg-box-${cleanId}`);
        suggBox.classList.remove('active');
        document.getElementById(`sugg-val-${cleanId}`).innerText = '-';
        return;
    }
    
    let sum = 0;
    checkedRadios.forEach(r => sum += parseInt(r.value));
    let avg = sum / checkedRadios.length;
    let suggestedScore = Math.round(avg);

    const suggBox = document.getElementById(`sugg-box-${cleanId}`);
    const suggValText = document.getElementById(`sugg-val-${cleanId}`);
    
    suggBox.dataset.suggested = suggestedScore;
    suggValText.innerText = suggestedScore;
    suggBox.classList.add('active');
}

function applySuggestion(cleanId) {
    const box = document.getElementById(`sugg-box-${cleanId}`);
    const score = parseInt(box.dataset.suggested);
    if(score >= 1 && score <= 5) {
        selectScore(cleanId, score);
    }
}

function selectScore(cleanId, score) {
    const group = document.getElementById(`btn-group-${cleanId}`);
    if(!group) return;
    group.querySelectorAll('.btn-score').forEach(b => b.className = 'btn-score');
    
    const clsObj = {5: 'lv5', 4: 'lv4', 3: 'lv3', 2: 'lv2', 1: 'lv1'};
    const btn = document.getElementById(`btn-${cleanId}-${score}`);
    if(btn) btn.className = `btn-score active ${clsObj[score]}`;
    
    const valInput = document.getElementById(`val-${cleanId}`);
    if(valInput) valInput.value = score;
    
    const table = document.getElementById(`rubric-${cleanId}`);
    if(table) {
        table.querySelectorAll('td').forEach(td => td.classList.remove('selected-level'));
        const cell = document.getElementById(`cell-${cleanId}-${score}`);
        if(score > 0 && cell) {
            cell.classList.add('selected-level');
        }
    }
    
    const evBox = document.getElementById(`evidence-box-${cleanId}`);
    const evLabel = document.getElementById(`evidence-label-${cleanId}`);
    if(evBox && evLabel) {
        const colors = {
            5: { border: '#16a34a', bg: '#f0fdf4', text: '#166534' }, 
            4: { border: '#84cc16', bg: '#ecfccb', text: '#3f6212' }, 
            3: { border: '#0284c7', bg: '#e0f2fe', text: '#0369a1' }, 
            2: { border: '#d97706', bg: '#fef3c7', text: '#92400e' }, 
            1: { border: '#dc2626', bg: '#fef2f2', text: '#991b1b' }  
        };
        
        if(score > 0) {
            evBox.style.borderColor = colors[score].border;
            evBox.style.backgroundColor = colors[score].bg;
            evLabel.innerHTML = `<span style="display:inline-block; padding:2px 8px; border-radius:4px; background:${colors[score].border}; color:white;">Seviye ${score}</span> &nbsp;Bu Puana Ait Kanıt (PDF/Görsel/URL) Ekle:`;
            evLabel.style.color = colors[score].text;
        } else {
            evBox.style.borderColor = '#94a3b8';
            evBox.style.backgroundColor = '#f8fafc';
            evLabel.innerHTML = `Kanıt Dosyası (PDF/Görsel) veya URL Ekle:`;
            evLabel.style.color = 'var(--primary)';
        }
    }

    calculateTotal();
}

function calculateTotal() {
    let grand = 0;
    rubricData.forEach((sec, sIdx) => {
        let rawTotal = 0;
        let rawMax = sec.items.length * 5; 
        
        sec.items.forEach(item => {
            let valId = item.id.replace(/\./g, '-');
            const valEl = document.getElementById(`val-${valId}`);
            rawTotal += valEl ? (parseInt(valEl.value) || 0) : 0;
        });

        let weightedScore = Math.round((rawTotal / rawMax) * sec.maxWeight);

        const secEl = document.getElementById(`sec-total-${sIdx}`);
        if(secEl) secEl.innerText = `${weightedScore} / ${sec.maxWeight} Puan`;
        
        let sumText = document.getElementById(`sum-${sIdx}`);
        if(sumText) {
            sumText.innerText = `${weightedScore} / ${sec.maxWeight}`;
            sumText.style.color = weightedScore >= (sec.maxWeight * 0.6) ? '#4ade80' : '#f87171';
        }
        
        grand += weightedScore;
    });

    const grandEl = document.getElementById('grand-total');
    if(grandEl) grandEl.innerText = grand;
    
    const badge = document.getElementById('status-badge');
    if(badge) {
        if(grand >= 300) { badge.innerText = "YÜKSEK KALİTE STANDARDI"; badge.style.background = "var(--success)"; }
        else if(grand >= 200) { badge.innerText = "YETERLİ / İZLENMELİ"; badge.style.background = "var(--warning)"; }
        else { badge.innerText = "CİDDİ İYİLEŞTİRME GEREKİYOR"; badge.style.background = "var(--danger)"; }
    }
}

function saveData() {
    const projNo = document.getElementById('proj-no').value.trim();
    if(!projNo) {
        alert("Sisteme kaydetmek için lütfen Kurum/Birim ID'si giriniz!");
        document.getElementById('proj-no').focus();
        return;
    }

    if (!GOOGLE_APP_URL || GOOGLE_APP_URL.includes("BURAYA_KENDİ_WEB_APP_URL_Nİ_YAPIŞTIR")) {
        alert("Lütfen HTML içindeki GOOGLE_APP_URL kısmına kendi Apps Script Web App linkinizi yapıştırın!");
        return;
    }

    document.getElementById('loader-text').innerText = "Veritabanına Kaydediliyor...";
    document.getElementById('loader').style.display = "flex";

    let payload = {
        projectNumber: projNo,
        projectName: document.getElementById('proj-name').value.trim(),
        grandTotal: document.getElementById('grand-total').innerText,
        status: document.getElementById('status-badge').innerText,
        overall: {
            summary: compressIfUseful(sanitizeCommentHTML(document.getElementById('overall-summary').innerHTML)),
            strengths: compressIfUseful(sanitizeCommentHTML(document.getElementById('overall-strengths').innerHTML)),
            weaknesses: compressIfUseful(sanitizeCommentHTML(document.getElementById('overall-weaknesses').innerHTML))
        },
        details: {}
    };

    let attachmentProblem = null;

    rubricData.forEach((sec) => {
        sec.items.forEach(item => {
            let cleanId = item.id.replace(/\./g, '-');
            const valEl = document.getElementById(`val-${cleanId}`);
            const commEl = document.getElementById(`comment-${cleanId}`);
            
            const rawAttachments = currentAttachments[cleanId] || [];
            const pendingAttachment = rawAttachments.find(att => (att.type === 'image' || att.type === 'pdf') && att.status !== 'done');
            if (pendingAttachment) {
                attachmentProblem = `Lütfen tüm dosya yüklemelerinin tamamlanmasını bekleyin. (${item.id} içindeki ${pendingAttachment.title || 'bir ek'})`;
            }

            payload.details[item.id] = {
                score: valEl ? (parseInt(valEl.value) || 0) : 0,
                comment: commEl ? compressIfUseful(sanitizeCommentHTML(commEl.innerHTML)) : "",
                checks: [],
                attachments: rawAttachments
                    .filter(att => att.status === 'done' && att.url)
                    .map(att => ({ type: att.type, title: att.title, url: att.url }))
            };
            
            for(let i=0; i<item.checks.length; i++) {
                let radio = document.querySelector(`input[name="L-${cleanId}-${i}"]:checked`);
                payload.details[item.id].checks.push(radio ? parseInt(radio.value) : 0);
            }
        });
    });

    let payloadString = JSON.stringify(payload);

    // Google Sheets hücre başına maksimum 50.000 karakterdir.
    const oversizedFields = [];
    const checkField = (key, value) => {
        const length = String(value || '').length;
        if (length > 50000) oversizedFields.push({ key, length });
    };

    checkField('projectNumber', payload.projectNumber);
    checkField('projectName', payload.projectName);
    checkField('overall.summary', payload.overall.summary);
    checkField('overall.strengths', payload.overall.strengths);
    checkField('overall.weaknesses', payload.overall.weaknesses);

    Object.keys(payload.details).forEach(id => {
        const entry = payload.details[id];
        checkField(`${id}.comment`, entry.comment);
        if (entry.attachments && Array.isArray(entry.attachments)) {
            entry.attachments.forEach((attach, idx) => {
                checkField(`${id}.attachments[${idx}].title`, attach.title);
                checkField(`${id}.attachments[${idx}].url`, attach.url);
            });
        }
    });

    if (attachmentProblem) {
        document.getElementById('loader').style.display = 'none';
        alert(`⚠️ Dosya eklerinde sorun var: ${attachmentProblem}`);
        return;
    }

    if (oversizedFields.length > 0) {
        document.getElementById('loader').style.display = 'none';
        const largest = oversizedFields.sort((a, b) => b.length - a.length).slice(0, 4);
        const details = largest.map(item => `• ${item.key}: ${item.length} karakter`).join('\n');
        alert(`⚠️ HATA: Kaydetmek istediğiniz verinin bazı alanları Google Sheets hücre sınırını aşıyor!\n\nEn büyük alanlar:\n${details}\n\nGoogle Sheets her hücre için maksimum 50.000 karakter destekler. Lütfen uzun yorumları birkaç küçük paragrafa bölerek kaydetmeyi deneyin.`);
        return;
    }

    fetch(GOOGLE_APP_URL, {
        method: 'POST',
        mode: 'cors',
        headers: {
            'Accept': 'application/json'
        },
        body: payloadString
    })
    .then(response => {
        document.getElementById('loader').style.display = "none";
        if (response.type === 'opaque') {
            alert("Veri sunucuya gönderildi. CORS kısıtlaması nedeniyle sunucudan gelen yanıt okunamadı. Sunucudaki kaydı kontrol edin.");
            return;
        }
        if (!response.ok) {
            return response.text().then(text => {
                throw new Error(`Sunucu hatası ${response.status}: ${text || response.statusText}`);
            });
        }
        return response.text().then(text => {
            try {
                return JSON.parse(text);
            } catch (parseErr) {
                throw new Error(`Beklenmeyen yanıt formatı: ${text}`);
            }
        });
    })
    .then(res => {
        if (!res) return;
        if (res.status === 'success') {
            alert(res.message);
            loadProjectList();
        } else {
            alert("Veritabanı Hatası: " + (res.message || JSON.stringify(res)));
        }
    })
    .catch(err => {
        document.getElementById('loader').style.display = "none";
        console.error('Kayıt hatası:', err);
        alert("Ağ Hatası: Sunucuya ulaşılamadı veya beklenmeyen yanıt alındı.\n\nDetay: " + err.message);
    });
}

function loadProjectList() {
    if (!GOOGLE_APP_URL || GOOGLE_APP_URL.includes("BURAYA_KENDİ_WEB_APP_URL_Nİ_YAPIŞTIR")) return;

    fetch(GOOGLE_APP_URL + "?action=getList", { mode: 'cors', cache: 'no-cache', credentials: 'omit' })
    .then(res => res.json())
    .then(list => {
        const sel = document.getElementById('project-selector');
        sel.innerHTML = '<option value="NEW">-- Yeni Değerlendirme Formu --</option>';
        list.forEach(id => {
            const opt = document.createElement('option');
            opt.value = id; opt.innerText = id;
            sel.appendChild(opt);
        });
    })
    .catch(err => console.log("Veritabanı liste çekme hatası: ", err));
}

function handleProjectSelection() {
    const val = document.getElementById('project-selector').value;
    if (val === "NEW") {
        document.getElementById('proj-no').value = '';
        document.getElementById('proj-name').value = '';
        document.getElementById('overall-summary').innerHTML = '';
        document.getElementById('overall-strengths').innerHTML = '';
        document.getElementById('overall-weaknesses').innerHTML = '';
        
        document.querySelectorAll('.btn-score').forEach(b => b.className = 'btn-score');
        document.querySelectorAll('.score-val').forEach(v => v.value = '0');
        document.querySelectorAll('.comment-area').forEach(t => t.innerHTML = '');
        document.querySelectorAll('.suggestion-box').forEach(b => { b.classList.remove('active'); b.dataset.suggested = "0"; });
        document.querySelectorAll('.sugg-value').forEach(v => v.innerText = "-");
        document.querySelectorAll('.likert-group input[type="radio"]').forEach(r => r.checked = false);
        document.querySelectorAll('.rubric-table td').forEach(td => td.classList.remove('selected-level'));
        
        document.querySelectorAll('.evidence-box').forEach(b => {
            b.style.backgroundColor = '#f8fafc';
            b.style.borderColor = '#94a3b8';
            let lbl = b.querySelector('label');
            if(lbl) { lbl.innerHTML = 'Kanıt Dosyası (PDF/Görsel) veya URL Ekle:'; lbl.style.color = 'var(--primary)'; }
        });
        
        currentAttachments = {};
        document.querySelectorAll('.preview-container').forEach(c => c.innerHTML = '');
        
        calculateTotal();
    } else {
        loadProjectData(val);
    }
}

function loadProjectData(projNo) {
    document.getElementById('loader-text').innerText = "Kayıt Veritabanından Yükleniyor...";
    document.getElementById('loader').style.display = "flex";

    fetch(`${GOOGLE_APP_URL}?action=load&projNo=${encodeURIComponent(projNo)}`, { mode: 'cors', cache: 'no-cache', credentials: 'omit' })
    .then(res => res.json())
    .then(res => {
        document.getElementById('loader').style.display = "none";
        if(res.status === 'success') {
            const data = res.data;
            document.getElementById('proj-no').value = data.projectNumber;
            document.getElementById('proj-name').value = data.projectName;
            document.getElementById('overall-summary').innerHTML = sanitizeCommentHTML(decompressIfNeeded(data.overall.summary || ""));
            document.getElementById('overall-strengths').innerHTML = sanitizeCommentHTML(decompressIfNeeded(data.overall.strengths || ""));
            document.getElementById('overall-weaknesses').innerHTML = sanitizeCommentHTML(decompressIfNeeded(data.overall.weaknesses || ""));

            document.querySelectorAll('.likert-group input[type="radio"]').forEach(r => r.checked = false);
            document.querySelectorAll('.suggestion-box').forEach(b => { b.classList.remove('active'); b.dataset.suggested = "0"; });
            document.querySelectorAll('.sugg-value').forEach(v => v.innerText = "-");

            currentAttachments = {};
            document.querySelectorAll('.preview-container').forEach(c => c.innerHTML = '');

            if(data.details) {
                Object.keys(data.details).forEach(id => {
                    let cleanId = id.replace(/\./g, '-');
                    let det = data.details[id];

                    let commentBox = document.getElementById(`comment-${cleanId}`);
                    if(commentBox) commentBox.innerHTML = sanitizeCommentHTML(decompressIfNeeded(det.comment || ""));
                    
                    if(det.checks) {
                        det.checks.forEach((val, cIdx) => {
                            if(val > 0) {
                                let radio = document.getElementById(`L-${cleanId}-${cIdx}-${val}`);
                                if(radio) radio.checked = true;
                            }
                        });
                        calculateSuggestion(cleanId);
                    }

                    if (det.score > 0) {
                        selectScore(cleanId, det.score);
                    }

                    if (det.attachments && det.attachments.length > 0) {
                        currentAttachments[cleanId] = det.attachments;
                        renderPreviews(cleanId);
                    }
                });
            }
        } else {
            alert("Veri yüklenemedi: " + res.message);
        }
    })
    .catch(err => {
        document.getElementById('loader').style.display = "none";
        alert("Ağ Hatası: Kayıt getirilemedi.");
    });
}

// ===================================================================
// YENİ: AKILLI YAPIŞTIRMA FİLTRESİ (SANITIZER)
// Kopyalanan metinlerin gizli biçimlendirmesini siler, sadece linkleri ve güvenli metni tutar
// ===================================================================

function escapeHtml(str) {
    return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function compressToBase64(input) {
    if (input == null || input === '') return '';
    const inputStr = String(input);
    const compressed = lzw_encode(inputStr);
    return btoa(compressed);
}

function decompressFromBase64(input) {
    if (input == null || input === '') return '';
    try {
        const decoded = atob(input);
        return lzw_decode(decoded);
    } catch (e) {
        return '';
    }
}

function lzw_encode(str) {
    const dict = {};
    const data = (str || '').split('');
    let phrase = data[0] || '';
    const out = [];
    let code = 256;

    for (let i = 1; i < data.length; i++) {
        const curr = data[i];
        const phraseCurr = phrase + curr;
        if (dict[phraseCurr] != null) {
            phrase = phraseCurr;
        } else {
            out.push(phrase.length > 1 ? dict[phrase] : phrase.charCodeAt(0));
            dict[phraseCurr] = code++;
            phrase = curr;
        }
    }

    if (phrase !== '') {
        out.push(phrase.length > 1 ? dict[phrase] : phrase.charCodeAt(0));
    }

    let result = '';
    for (let i = 0; i < out.length; i++) {
        result += String.fromCharCode((out[i] >> 8) & 0xff, out[i] & 0xff);
    }
    return result;
}

function lzw_decode(str) {
    const data = [];
    for (let i = 0; i < str.length; i += 2) {
        data.push((str.charCodeAt(i) << 8) | str.charCodeAt(i + 1));
    }

    const dict = [];
    let curr = String.fromCharCode(data[0]);
    let old = curr;
    const out = [curr];
    let code = 256;

    for (let i = 1; i < data.length; i++) {
        const currCode = data[i];
        let phrase;
        if (currCode < 256) {
            phrase = String.fromCharCode(currCode);
        } else {
            phrase = dict[currCode] ? dict[currCode] : old + old.charAt(0);
        }
        out.push(phrase);
        dict[code++] = old + phrase.charAt(0);
        old = phrase;
    }

    return out.join('');
}

function compressIfUseful(text) {
    const sanitized = String(text || '');
    if (!sanitized) return '';
    const compressed = '#LZ#' + compressToBase64(sanitized);
    return compressed.length < sanitized.length ? compressed : sanitized;
}

function decompressIfNeeded(text) {
    const value = String(text || '');
    if (value.startsWith('#LZ#')) {
        return decompressFromBase64(value.slice(4)) || '';
    }
    return value;
}

function sanitizeCommentHTML(html) {
    const temp = document.createElement('div');
    temp.innerHTML = html || '';

    const badTags = new Set(['script', 'style', 'img', 'iframe', 'object', 'embed', 'picture', 'svg', 'canvas', 'table', 'tbody', 'thead', 'tfoot', 'tr', 'td', 'th', 'video', 'audio', 'form', 'input', 'button', 'select', 'textarea', 'label', 'option']);

    function sanitizeNode(node) {
        if (node.nodeType === Node.TEXT_NODE) {
            return escapeHtml(node.nodeValue || '')
                .replace(/[\u200B\u200C\u200D\uFEFF]/g, '')
                .replace(/\u00A0/g, ' ');
        }

        if (node.nodeType !== Node.ELEMENT_NODE) {
            return '';
        }

        const tag = node.tagName.toLowerCase();
        if (badTags.has(tag)) {
            return '';
        }

        if (tag === 'a') {
            const href = (node.getAttribute('href') || '').trim();
            const safeHref = href.replace(/[\u0000-\u001F\u007F]+/g, '').replace(/\s+/g, ' ');
            if (!/^https?:\/\//i.test(safeHref) && !/^mailto:/i.test(safeHref)) {
                return sanitizeChildren(node);
            }
            const text = sanitizeChildren(node).trim() || escapeHtml(safeHref);
            return `<a href="${escapeHtml(safeHref)}" target="_blank" rel="noopener noreferrer">${text}</a>`;
        }

        if (tag === 'br') {
            return '<br>';
        }

        return sanitizeChildren(node);
    }

    function sanitizeChildren(parent) {
        return Array.from(parent.childNodes).map(sanitizeNode).join('');
    }

    let cleaned = sanitizeChildren(temp)
        .replace(/\s{2,}/g, ' ')
        .replace(/((&nbsp;)|\u00A0)/g, ' ')
        .replace(/(<br>\s*){2,}/g, '<br>')
        .replace(/^(<br>)+|(<br>)+$/g, '')
        .trim();

    return cleaned;
}

function sanitizePlainText(text) {
    const escaped = escapeHtml(text || '');
    return escaped.replace(/\r\n|\r|\n/g, '<br>');
}

// 1. Tıklama Yakalayıcı (Linkleri yeni sekmede açar)
document.addEventListener('click', function(e) {
    const link = e.target.closest('a');
    if (link && e.target.closest('.comment-area')) {
        e.preventDefault();
        window.open(link.href, '_blank');
    }
});

// 2. Yapıştırma Yakalayıcı (Metinleri ve linkleri temizler)
document.addEventListener('paste', function(e) {
    const commentArea = e.target.closest('.comment-area');
    if (!commentArea) return;

    e.preventDefault();
    const clipboard = e.clipboardData || window.clipboardData;
    let pasteHtml = clipboard.getData('text/html');
    let insertValue = '';

    if (pasteHtml) {
        insertValue = sanitizeCommentHTML(pasteHtml);
    }

    if (!insertValue) {
        const plainText = clipboard.getData('text/plain') || '';
        insertValue = sanitizePlainText(plainText);
    }

    if (insertValue) {
        document.execCommand('insertHTML', false, insertValue);
    }
});
